apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: go-service
  title: Go Service (Golden Path)
  description: >
    Scaffolds a production-ready Go microservice with the minicloud golden path:
    CI/CD pipeline, Kustomize GitOps overlays, Backstage catalog entity, and
    Gatekeeper-compliant security context. Creates the GitHub repo, dev/staging
    branches, and opens a PR on minicloud-gitops.
  tags:
    - go
    - microservice
    - golden-path
spec:
  owner: group:default/platform
  type: service

  parameters:
    - title: Service Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Name
          type: string
          description: >
            Unique slug for this service — lowercase, hyphens only, 4-30 chars.
            Becomes the GitHub repo name, namespace prefix, and Harbor image name.
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One-line description (used in GitHub repo + Backstage catalog)
        owner:
          title: Owner
          type: string
          description: Backstage entity ref for the owning team (e.g. group:default/platform)
          default: group:default/platform
        port:
          title: Container Port
          type: integer
          description: Port the service listens on
          default: 8080

  steps:
    - id: fetch-service
      name: Generate service files
      action: fetch:template
      input:
        url: ./skeleton/service
        targetPath: ./service
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}

    - id: fetch-gitops
      name: Generate GitOps manifests
      action: fetch:template
      input:
        url: ./skeleton/gitops
        targetPath: ./gitops
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}

    - id: publish
      name: Create GitHub repository
      action: publish:github
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        description: ${{ parameters.description }}
        defaultBranch: main
        sourcePath: ./service
        gitAuthorName: AndreLiar
        gitAuthorEmail: andrelaurelyvan.kanmegnetabouguie@ynov.com
        gitCommitMessage: "feat: initial scaffold by Backstage golden-path template"
        deleteBranchOnMerge: true
        protectDefaultBranch: false

    - id: create-dev-branch
      name: Create dev branch
      action: github:branch:create
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        name: dev
        sourceBranch: main

    - id: create-staging-branch
      name: Create staging branch
      action: github:branch:create
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        name: staging
        sourceBranch: main

    - id: gitops-pr
      name: Open GitOps PR on minicloud-gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=minicloud-gitops
        title: "feat(${{ parameters.name }}): scaffold service"
        description: |
          Auto-generated by the Backstage go-service golden-path template.

          **Adds:**
          - `services/${{ parameters.name }}/` — Kustomize base + dev/staging/prod overlays
          - `apps/${{ parameters.name }}-dev.yaml` — ArgoCD Application (auto-sync on dev overlay)

          **Manual steps after merging:**
          1. Add `${{ parameters.name }}-dev` (and `-staging`, `-prod`) to `manifests/argocd-project/00-project.yaml` destinations
          2. Create Vault policy and seed initial secrets at `secret/platform/${{ parameters.name }}/config`
          3. Promote to staging/prod by opening PRs that update the overlay `newTag`
        branchName: scaffolder/${{ parameters.name }}
        sourcePath: ./gitops
        targetPath: .
        gitCommitMessage: "feat(${{ parameters.name }}): add service GitOps manifests"

    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: GitOps PR
        url: ${{ steps.gitops-pr.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
    text:
      - title: Next steps
        content: |
          ### After the GitOps PR is merged

          1. **AppProject** — add `${{ parameters.name }}-dev` to destinations in
             `manifests/argocd-project/00-project.yaml` and commit.

          2. **Vault** — create a policy and seed secrets:
             ```
             vault policy write ${{ parameters.name }} - <<EOF
             path "secret/data/platform/${{ parameters.name }}/*" { capabilities = ["read"] }
             EOF
             vault kv put secret/platform/${{ parameters.name }}/config \
               environment=dev log_level=info
             ```

          3. **Push your first image** — push to the `dev` branch to trigger CI
             and auto-deploy to the `${{ parameters.name }}-dev` namespace.
