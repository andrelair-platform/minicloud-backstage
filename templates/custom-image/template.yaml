apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: custom-image
  title: Custom Image (Upstream Wrapper)
  description: >
    Scaffolds a repo that wraps an upstream container image with the minicloud
    CA cert baked in. Generates the golden-path CI (build + push to Harbor,
    Trivy, Cosign, SBOM, sed-based gitops bump), a Backstage catalog entity,
    and a PR on minicloud-gitops with the deployment manifest. Creates Vault
    policy and seeds initial secrets automatically.
  tags:
    - container
    - custom-image
    - golden-path
spec:
  owner: group:default/platform
  type: service

  parameters:
    - title: Image Details
      required:
        - name
        - description
        - upstreamImage
        - gitopsFile
        - owner
      properties:
        name:
          title: Name
          type: string
          description: >
            Unique slug — lowercase, hyphens only, 4-30 chars. Becomes the
            GitHub repo name and Harbor image name (library/<name>).
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One-line description (GitHub repo + Backstage catalog)
        upstreamImage:
          title: Upstream Image
          type: string
          description: >
            Full upstream image reference, e.g. ghcr.io/open-webui/open-webui:0.6.0
          default: ghcr.io/upstream/image:latest
        gitopsFile:
          title: GitOps file to bump
          type: string
          description: >
            Path in minicloud-gitops where the sed bump will update the image
            tag, e.g. helm-values/my-service-values.yaml or
            manifests/my-service/00-deployment.yaml. The scaffolder creates
            the file in the GitOps PR — you can move the image line later.
        owner:
          title: Owner
          type: string
          description: Backstage entity ref for the owning team
          default: group:default/platform

  steps:
    - id: fetch-service
      name: Generate service files
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./service
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          upstreamImage: ${{ parameters.upstreamImage }}
          gitopsFile: ${{ parameters.gitopsFile }}

    - id: fetch-gitops
      name: Generate GitOps manifest
      action: fetch:template
      input:
        url: ./skeleton-gitops
        targetPath: ./gitops
        values:
          name: ${{ parameters.name }}
          gitopsFile: ${{ parameters.gitopsFile }}

    - id: publish
      name: Create GitHub repository
      action: publish:github
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        description: ${{ parameters.description }}
        defaultBranch: main
        sourcePath: ./service
        gitAuthorName: AndreLiar
        gitAuthorEmail: andrelaurelyvan.kanmegnetabouguie@ynov.com
        gitCommitMessage: "feat: initial scaffold by Backstage custom-image template"
        deleteBranchOnMerge: true
        protectDefaultBranch: false

    - id: create-dev-branch
      name: Create dev branch
      action: github:branch:create
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        name: dev
        sourceBranch: main

    - id: create-staging-branch
      name: Create staging branch
      action: github:branch:create
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=${{ parameters.name }}
        name: staging
        sourceBranch: main

    - id: gitops-pr
      name: Open GitOps PR on minicloud-gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=andrelair-platform&repo=minicloud-gitops
        title: "feat(${{ parameters.name }}): scaffold custom image deployment"
        description: |
          Auto-generated by the Backstage custom-image template.

          **Adds:**
          - `${{ parameters.gitopsFile }}` — deployment manifest with placeholder image tag

          **After merging, push to `main` in the new repo to trigger the first CI build.**
          CI will sed-replace the placeholder tag with the real SHA on success.
        branchName: scaffolder/${{ parameters.name }}
        sourcePath: ./gitops
        targetPath: .
        gitCommitMessage: "feat(${{ parameters.name }}): add deployment manifest"

    - id: vault-setup
      name: Create Vault policy and seed initial secrets
      action: vault:policy:create
      input:
        name: ${{ parameters.name }}

    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: GitOps PR
        url: ${{ steps.gitops-pr.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
    text:
      - title: Next steps
        content: |
          ### Vault (auto-created)
          Policy `${{ parameters.name }}` and initial secrets at
          `secret/platform/${{ parameters.name }}/config` were created automatically.

          ### After the GitOps PR is merged
          Push to the `main` branch of the new repo — CI will build the custom
          image, push to Harbor, and sed-bump `${{ parameters.gitopsFile }}`.

          ### If your deployment is Helm-managed
          The scaffold created `${{ parameters.gitopsFile }}` as a plain
          Deployment manifest. If you're actually bumping a Helm values file,
          update the `image.tag:` line format to match your chart's schema.
