name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: harbor.10.0.0.200.nip.io
  IMAGE_REPO: library/backstage
  GITOPS_REPO: andrelair-platform/minicloud-gitops
  GITOPS_VALUES: helm-values/backstage-values.yaml

jobs:
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Cosign keyless signing

    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - name: Compute SHA
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # ── Trust the minicloud self-signed CA so Docker accepts Harbor TLS ────
      - name: Trust minicloud CA
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}
          echo "${{ secrets.MINICLOUD_CA_CERT }}" \
            | sudo tee /etc/docker/certs.d/${{ env.REGISTRY }}/ca.crt
          # Also add to system trust for cosign / crane
          echo "${{ secrets.MINICLOUD_CA_CERT }}" | sudo tee /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates

      # ── Build Backstage bundles ──────────────────────────────────────────────
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Backstage (app + backend bundles)
        run: |
          yarn tsc
          yarn build:backend

      # ── Build and push image to Harbor ──────────────────────────────────────
      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor.10.0.0.200.nip.io"]
              insecure = true

      - name: Build and push to Harbor
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: scan + sign ────────────────────────────────────────────────
      - name: Scan for critical CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}-amd64
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}@${{ steps.push.outputs.digest }} \
            -o cyclonedx-json=sbom.json

      - name: Sign image (keyless — GitHub OIDC → Sigstore Fulcio)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}@${{ steps.push.outputs.digest }}

      - name: Attach SBOM to image as OCI referrer
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}@${{ steps.push.outputs.digest }}

  bump-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout minicloud-gitops
        uses: actions/checkout@v7
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Bump image tag in backstage-values.yaml
        env:
          SHA: ${{ needs.build-and-push.outputs.sha }}
        run: |
          TAG="${SHA}-amd64"
          FILE="${{ env.GITOPS_VALUES }}"

          # Only update the backstage.image block (lines 10-15).
          # Use python to scope the replacement — sed s|registry|… would also
          # hit the postgresql subchart's image block further down the file.
          python3 - "$FILE" "$TAG" "$SHA" << 'PYEOF'
          import sys, re, datetime
          path, tag, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          content = open(path).read()
          today = datetime.date.today().isoformat()
          # Comment line just above the image block
          content = re.sub(r'# git SHA: .* — .*', f'# git SHA: {sha} — built {today} by CI', content)
          # Only replace tag: "...-amd64" (unique — postgresql tag has no -amd64 suffix)
          content = re.sub(r'(tag: ")[^"]*-amd64(")', rf'\g<1>{tag}\2', content)
          open(path, 'w').write(content)
          PYEOF

          git add "$FILE"
          if git diff --cached --quiet; then
            echo "No change — already at ${TAG}"
            exit 0
          fi
          git commit -S -m "ci(backstage): bump image to ${TAG}"
          git push
